name: Knowledge Graph Write

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name"
        required: true
        default: "knowledge-update"
      category:
        description: "Knowledge category"
        required: true
        default: "Collapse"
      console:
        description: "Target console"
        required: true
        default: "Urban_Operation_Console"
      topic:
        description: "Topic name"
        required: true
        default: "Queue_Saturation"

permissions:
  contents: write
  pull-requests: write

jobs:
  write-knowledge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Branch
        run: |
          git checkout -b ${{ github.event.inputs.branch_name }}

      - name: Create Knowledge Folder
        run: |
          mkdir -p "GENERATED_KNOWLEDGE/${{ github.event.inputs.category }}/${{ github.event.inputs.console }}"

      - name: Generate Knowledge Node
        run: |
          cat << 'EOF' > "GENERATED_KNOWLEDGE/${{ github.event.inputs.category }}/${{ github.event.inputs.console }}/${{ github.event.inputs.topic }}.md"
          # ${{ github.event.inputs.topic }}

          ## Category
          ${{ github.event.inputs.category }}

          ## Target Layer
          ${{ github.event.inputs.console }}

          ## Definition
          This node defines how ${{ github.event.inputs.topic }} functions within the Urban OS knowledge graph.

          ## Operational Meaning
          This topic connects collapse, operation, UX, PL, KPI, and control logic into executable urban mobility knowledge.

          ## Graph Role
          - [[Collapse]]
          - [[Operation]]
          - [[UX]]
          - [[PL_Business]]
          - [[KPI]]
          - [[Control]]

          ## Related
          - [[Urban_Operation_Console]]
          - [[Service_Hub_Console]]
          - [[Fleet_Operation_Console]]
          - [[Seneschal]]
          EOF

      - name: Commit Changes
        run: |
          git config --global user.name "ChatGPT-Knowledge-Bot"
          git config --global user.email "bot@openai.com"
          git add .
          git commit -m "Add knowledge node: ${{ github.event.inputs.topic }}" || echo "No changes"

      - name: Push Branch
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:$GH_WRITE_TOKEN@github.com/Satofumi-Goto/UrbanOS_Operation_Control.git
          git push origin ${{ github.event.inputs.branch_name }}

      - name: Create Pull Request
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          curl -X POST \
          -H "Authorization: token $GH_WRITE_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/Satofumi-Goto/UrbanOS_Operation_Control/pulls \
          -d '{
            "title":"Knowledge Graph Update: ${{ github.event.inputs.topic }}",
            "head":"'"${{ github.event.inputs.branch_name }}"'",
            "base":"main",
            "body":"Automated knowledge graph update PR."
          }'
