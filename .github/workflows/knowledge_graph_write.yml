name: Knowledge Graph Mass Generator

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name"
        required: true
        default: "mass-knowledge-update"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-knowledge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Branch
        run: |
          git checkout -b ${{ github.event.inputs.branch_name }}

      - name: Create Folder Structure
        run: |
          mkdir -p GENERATED_KNOWLEDGE

          categories=(
            "01_Collapse"
            "02_Operation"
            "03_UX"
            "04_PL_Business"
            "05_KPI"
            "06_Control"
          )

          consoles=(
            "Overall"
            "Urban_Operation_Console"
            "Service_Hub_Console"
            "Fleet_Operation_Console"
            "Seneschal"
          )

          for category in "${categories[@]}"; do
            for console in "${consoles[@]}"; do
              mkdir -p "GENERATED_KNOWLEDGE/$category/$console"
            done
          done

      - name: Generate Collapse Knowledge
        run: |
          collapse_topics=(
            "Queue_Saturation"
            "Dispatch_Collapse"
            "Fleet_Deadlock"
            "Node_Gridlock"
            "Revenue_Collapse"
            "ETA_Collapse"
            "Synchronization_Failure"
            "ODD_Fragmentation"
            "Energy_Propagation"
            "Utilization_Collapse"
          )

          consoles=(
            "Overall"
            "Urban_Operation_Console"
            "Service_Hub_Console"
            "Fleet_Operation_Console"
            "Seneschal"
          )

          for topic in "${collapse_topics[@]}"; do
            for console in "${consoles[@]}"; do

              cat << EOF > "GENERATED_KNOWLEDGE/01_Collapse/$console/${topic}.md"
# ${topic}

## Layer
01_Collapse

## Console
${console}

## Definition
${topic} represents a collapse propagation condition within the Urban OS operational structure.

## Operational Meaning
This node defines how ${topic} affects synchronized urban mobility execution.

## Collapse Relation
- Queue
- Dispatch
- Fleet
- ETA
- Revenue
- Node
- ODD
- Synchronization

## Related
- [[Queue_Saturation]]
- [[Dispatch_Collapse]]
- [[Fleet_Deadlock]]
- [[Revenue_Collapse]]
EOF

            done
          done

      - name: Generate Operation Knowledge
        run: |
          operation_topics=(
            "Dispatch_Rebalance_Execution"
            "Fleet_Synchronization"
            "Node_Turnaround"
            "Shared_Ride_Operation"
            "ETA_Recalculation"
            "Continuous_Operation"
            "Queue_Balancing"
            "Dispatch_Restriction"
            "Fleet_Reallocation"
            "Urban_Execution_State"
          )

          consoles=(
            "Overall"
            "Urban_Operation_Console"
            "Service_Hub_Console"
            "Fleet_Operation_Console"
            "Seneschal"
          )

          for topic in "${operation_topics[@]}"; do
            for console in "${consoles[@]}"; do

              cat << EOF > "GENERATED_KNOWLEDGE/02_Operation/$console/${topic}.md"
# ${topic}

## Layer
02_Operation

## Console
${console}

## Definition
${topic} defines operational synchronization behavior within Urban OS execution.

## Operational Meaning
This node explains how ${topic} stabilizes autonomous mobility execution.

## Related
- [[Fleet_Synchronization]]
- [[Dispatch_Collapse]]
- [[Queue_Saturation]]
- [[Continuous_Operation]]
EOF

            done
          done

      - name: Commit Changes
        run: |
          git config --global user.name "ChatGPT-Knowledge-Bot"
          git config --global user.email "bot@openai.com"

          git add .
          git commit -m "Generate mass knowledge graph pack" || echo "No changes"

      - name: Push Branch
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:$GH_WRITE_TOKEN@github.com/Satofumi-Goto/UrbanOS_Operation_Control.git
          git push origin ${{ github.event.inputs.branch_name }}

      - name: Create Pull Request
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          curl -X POST \
          -H "Authorization: token $GH_WRITE_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/Satofumi-Goto/UrbanOS_Operation_Control/pulls \
          -d '{
            "title":"Mass Knowledge Graph Generation",
            "head":"'"${{ github.event.inputs.branch_name }}"'",
            "base":"main",
            "body":"Automated mass knowledge graph generation PR."
          }'
