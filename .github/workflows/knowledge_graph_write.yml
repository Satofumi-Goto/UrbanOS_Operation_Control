name: Knowledge Graph Mass Generator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-knowledge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Generator
        run: |
          python3 scripts/generate_knowledge.py

      - name: Commit Changes
        run: |
          git config --global user.name "ChatGPT-Knowledge-Bot"
          git config --global user.email "bot@openai.com"

          git add .
          git commit -m "Generate knowledge pack" || echo "No changes"

      - name: Push Branch
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          git checkout -b mass-knowledge-update-001

          git remote set-url origin https://x-access-token:$GH_WRITE_TOKEN@github.com/Satofumi-Goto/UrbanOS_Operation_Control.git

          git push origin mass-knowledge-update-001
