name: Knowledge Graph Mass Generator

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name"
        required: true
        default: "mass-knowledge-update-001"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-knowledge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Branch
        run: git checkout -b "${{ github.event.inputs.branch_name }}"

      - name: Generate Knowledge Pack
        run: |
          python3 <<'PY'
          from pathlib import Path

          base = Path("GENERATED_KNOWLEDGE")

          nodes = [
              ("01_Collapse", "Overall", "Queue_Saturation"),
              ("01_Collapse", "Urban_Operation_Console", "Dispatch_Collapse"),
              ("01_Collapse", "Service_Hub_Console", "Node_Gridlock"),
              ("01_Collapse", "Fleet_Operation_Console", "Fleet_Deadlock"),
              ("01_Collapse", "Seneschal", "ETA_Collapse"),
              ("02_Operation", "Overall", "Urban_Execution_State"),
              ("02_Operation", "Urban_Operation_Console", "Dispatch_Rebalance_Execution"),
              ("02_Operation", "Service_Hub_Console", "Node_Turnaround"),
              ("02_Operation", "Fleet_Operation_Console", "Fleet_Synchronization"),
              ("02_Operation", "Seneschal", "User_Intent_Execution")
          ]

          for category, console, topic in nodes:
              folder = base / category / console
              folder.mkdir(parents=True, exist_ok=True)

              content = f"""# {topic}

## Layer
{category}

## Console
{console}

## Definition
{topic} is a knowledge node within the Urban OS operating structure.

## Operational Meaning
This node connects collapse, operation, UX, PL, KPI, and control logic.

## Related
- [[Queue_Saturation]]
- [[Dispatch_Collapse]]
- [[Fleet_Synchronization]]
- [[Node_Turnaround]]
"""
              (folder / f"{topic}.md").write_text(content, encoding="utf-8")
          PY

      - name: Commit Changes
        run: |
          git config --global user.name "ChatGPT-Knowledge-Bot"
          git config --global user.email "bot@openai.com"
          git add .
          git commit -m "Generate validated knowledge pack" || echo "No changes"

      - name: Push Branch
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:$GH_WRITE_TOKEN@github.com/Satofumi-Goto/UrbanOS_Operation_Control.git
          git push origin "${{ github.event.inputs.branch_name }}"

      - name: Create Pull Request
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GH_WRITE_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Satofumi-Goto/UrbanOS_Operation_Control/pulls \
            -d '{"title":"Validated Knowledge Pack","head":"'"${{ github.event.inputs.branch_name }}"'","base":"main","body":"Validated knowledge pack generated by workflow."}'
