name: Knowledge Graph Write

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name"
        required: true
        default: "knowledge-update"

permissions:
  contents: write
  pull-requests: write

jobs:
  write-knowledge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Branch
        run: |
          git checkout -b ${{ github.event.inputs.branch_name }}

      - name: Create Generated Folder
        run: |
          mkdir -p GENERATED_KNOWLEDGE

      - name: Generate Placeholder
        run: |
          cat << 'EOF' > GENERATED_KNOWLEDGE/README.md
          # GENERATED KNOWLEDGE

          This folder is reserved for AI-generated knowledge graph nodes.

          Future workflow:
          ChatGPT
          → Pull Request
          → Human Approval
          → Merge
          EOF

      - name: Commit Changes
        run: |
          git config --global user.name "ChatGPT-Knowledge-Bot"
          git config --global user.email "bot@openai.com"

          git add .
          git commit -m "Initialize knowledge graph workflow" || echo "No changes"

      - name: Push Branch
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:$GH_WRITE_TOKEN@github.com/Satofumi-Goto/UrbanOS_Operation_Control.git
          git push origin ${{ github.event.inputs.branch_name }}

      - name: Create Pull Request
        env:
          GH_WRITE_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}
        run: |
          curl -X POST \
          -H "Authorization: token $GH_WRITE_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/Satofumi-Goto/UrbanOS_Operation_Control/pulls \
          -d '{
            "title":"Knowledge Graph Update",
            "head":"'"${{ github.event.inputs.branch_name }}"'",
            "base":"main",
            "body":"Automated knowledge graph update PR."
          }'
